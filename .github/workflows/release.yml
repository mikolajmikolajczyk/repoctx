name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: cargo build --release
        run: cargo build --release --locked --target ${{ matrix.target }} -p repoctx

      - name: Resolve version + asset name
        id: meta
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          asset="repoctx-${version}-${{ matrix.target }}"
          echo "version=$version"  >> "$GITHUB_OUTPUT"
          echo "asset=$asset"      >> "$GITHUB_OUTPUT"

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          staging="${{ steps.meta.outputs.asset }}"
          mkdir "$staging"
          cp "target/${{ matrix.target }}/release/repoctx" "$staging/"
          cp README.md LICENSE CHANGELOG.md "$staging/"
          tar czf "$staging.tar.gz" "$staging"
          shasum -a 256 "$staging.tar.gz" > "$staging.tar.gz.sha256"

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $staging = "${{ steps.meta.outputs.asset }}"
          New-Item -ItemType Directory -Path $staging | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/repoctx.exe" -Destination "$staging/"
          Copy-Item README.md, LICENSE, CHANGELOG.md -Destination "$staging/"
          Compress-Archive -Path "$staging/*" -DestinationPath "$staging.zip"
          $hash = (Get-FileHash "$staging.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  $staging.zip" | Out-File -Encoding ascii "$staging.zip.sha256"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.meta.outputs.asset }}.${{ matrix.archive }}
            ${{ steps.meta.outputs.asset }}.${{ matrix.archive }}.sha256
          fail_on_unmatched_files: true
          draft: false
