name = "opencode"
description = "opencode skill + AGENTS.md guidance + a runtime plugin that rewrites rg/grep to repoctx."

[[file]]
src = "../shared/SKILL.md"
dest = ".agents/skills/repoctx/SKILL.md"
mode = "write"

[[file]]
src = "plugin.ts"
dest = ".opencode/plugin/repoctx.ts"
mode = "write"

[[file]]
src = "../shared/AGENTS.md.fragment"
dest = "AGENTS.md"
mode = "merge-section"
start_marker = "<!-- repoctx:start -->"
end_marker = "<!-- repoctx:end -->"
