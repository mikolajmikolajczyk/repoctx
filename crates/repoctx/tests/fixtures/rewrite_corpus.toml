expect = 'passthrough'
why = 'command chaining'

[[case]]
cmd = 'rg foo; ls'
expect = 'passthrough'
why = 'command separator'

[[case]]
cmd = 'rg foo > out'
expect = 'passthrough'
why = 'redirect'

[[case]]
