# Rewrite-decision corpus (issue 573eccc).
#
# Each [[case]] is one bash command → the decision the hook MUST make.
# Asserted through BOTH entry points: the pure `try_semantic_rewrite`
# (unit test in src/hook_rewrite.rs) and the shipping `repoctx hook claude`
# CLI (tests/rewrite_corpus.rs). The two MUST agree.
#
# Fields:
#   cmd    — the bash command as the agent would run it
#   expect — "rewrite" | "passthrough"
#   rule   — (rewrite only) exact RULES[].name that should fire
#   to     — (rewrite only) the exact rewritten command string
#   why    — (passthrough only) human note on the reason; not asserted
#
# Soundness bias: when in doubt the engine passes through. A rewrite that
# differs from `to` is a corruption bug; a passthrough that should rewrite
# is a missed opportunity. Both fail the test.
#
# Rule names (must match src/hook_rewrite.rs RULES):
#   'rg <ident>'
#   'rg "fn <ident>" / class / struct / function'
#   'grep -r <ident> .'
#   'grep -rn "fn <ident>" (and friends)'

# ─────────────────────────────────────────────────────────────────────
# MUST REWRITE — rule: rg <ident>
# ─────────────────────────────────────────────────────────────────────
[[case]]
cmd = 'rg foo'
expect = 'rewrite'
rule = 'rg <ident>'
to = 'repoctx symbols foo --json'

